name: daily-refresh

on:
  schedule:
    - cron: "45 21 * * 1-5"   # 21:45 UTC, after US close, weekdays
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Refit surface
        run: python scripts/refresh.py SPY
      - name: Commit snapshot
        run: |
          git config user.name "svi-lab bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ charts/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: daily surface refresh ($(date -u +%F))"
          git push
